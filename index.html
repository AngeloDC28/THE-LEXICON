  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bone: '#FAF9F6',
            overlay: '#FDFCF0',
          },
          fontFamily: {
            inter: ['Inter', 'Helvetica', 'Arial', 'sans-serif'],
            mono: ['"IBM Plex Mono"', '"Courier New"', 'monospace'],
          },
        },
      },

  <style>
    *, *::before, *::after {
      cursor: crosshair;
      border-radius: 0 !important;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #FAF9F6;
      color: #000000;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      overflow: hidden;
    }

    #app-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Desaturated high-contrast */
    .desaturate {
      filter: grayscale(70%) contrast(1.15);
    }

    /* Hotspot dot: ONLY circular element */
    .hotspot-dot {
      width: 16px;
      height: 16px;
      background: #000000;
      border: 3px solid #FAF9F6;
      border-radius: 50% !important;
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: crosshair;
      z-index: 10;
      transition: transform 0.12s ease;
    }
    .hotspot-dot:hover {
      transform: translate(-50%, -50%) scale(1.35);
    }

    /* Info box */
    .info-box {
      border: 3px solid #000000;
      background: #FDFCF0;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      box-shadow: 6px 6px 0px #000000;
    }

    /* Active/inverted row */
    .entry-row-active {
      background: #000000 !important;
      color: #FFFFFF !important;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #FAF9F6; }
    ::-webkit-scrollbar-thumb { background: #000; }

    /* Image grid tight layout */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .image-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Taxonomy 2-col grid */
    .taxonomy-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .taxonomy-cell {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: crosshair;
      border-bottom: 2px solid #000;
      border-right: 2px solid #000;
      transition: all 0.08s ease;
    }
    .taxonomy-cell:nth-child(even) {
      border-right: none;
    }
    .taxonomy-cell:hover {
      background: #000;
      color: #fff;
    }
    .taxonomy-cell.active {
      background: #000;
      color: #fff;
    }

    /* Grid hover overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .group:hover .grid-overlay {
      opacity: 1;
    }

    /* Taxonomy pill buttons */
    .tag-pill {
      border: 2px solid #000;
      padding: 4px 10px;
      font-size: 9px;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: transparent;
      color: #000;
      cursor: crosshair;
      transition: all 0.1s ease;
    }
    .tag-pill:hover {
      background: #000;
      color: #fff;
    }

    /* Related entry card */
    .related-card {
      border: 2px solid #000;
      cursor: crosshair;
      transition: all 0.1s ease;
      flex-shrink: 0;
    }
    .related-card:hover {
      background: #000;
      color: #fff;
    }

    /* Taxonomy sub-category panel */
    .taxonomy-sub-item {
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: crosshair;
      border-bottom: 1px solid #000;
      transition: all 0.08s ease;
    }
    .taxonomy-sub-item:hover {
      background: #000;
      color: #fff;
    }
    .taxonomy-sub-item.active {
      background: #000;
      color: #fff;
    }
    .taxonomy-group-header {
      padding: 6px 12px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: crosshair;
      border-bottom: 2px solid #000;
      background: #FAF9F6;
      transition: all 0.08s ease;
    }
    .taxonomy-group-header:hover {
      background: #000;
      color: #fff;
    }
    .taxonomy-group-header.active {
      background: #000;
      color: #fff;
    }

    /* Detail bottom navigation */
    .detail-bottom-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-top: 3px solid #000;
    }
    .detail-bottom-nav button {
      font-size: 10px;
      font-weight: 700;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: crosshair;
      border: 2px solid #000;
      padding: 5px 12px;
      background: transparent;
      transition: all 0.08s ease;
    }
    .detail-bottom-nav button:hover {
      background: #000;
      color: #fff;
    }
  </style>
</head>

  <div id="app-root">

         TOP HEADER BAR
    ============================================================ -->

    ============================================================ -->

        <!-- Search -->

        </div>

        <!-- Entry List -->
        <div id="entry-list" class="overflow-y-auto flex-1">
          <!-- Rendered by JS -->
        </div>

        <!-- Taxonomy Grid -->
        <div id="taxonomy-container" class="shrink-0 border-t-[3px] border-black overflow-y-auto" style="max-height: 45%;">
          <div class="px-4 py-2">
            <span class="text-[9px] uppercase tracking-[0.2em] opacity-40">Taxonomy</span>
          </div>
          <div id="taxonomy-grid" class="taxonomy-grid">
            <!-- Top-level pillars rendered by JS -->
          </div>
          <div id="taxonomy-sub" class="hidden">
            <!-- Sub-categories rendered by JS -->
          </div>
        </div>

        <!-- Active Entry Panel -->
        <div id="active-entry-panel" class="hidden shrink-0 border-t-[3px] border-black overflow-y-auto" style="max-height: 45%;">
          <div class="px-4 py-2 border-b-[3px] border-black bg-bone flex items-center justify-between">
            <span id="active-entry-title" class="text-[10px] font-bold uppercase tracking-[0.12em]"></span>
            <button id="btn-close-detail" class="text-xs font-bold uppercase tracking-wider hover:opacity-60">X</button>
          </div>
          <div id="active-entry-hotspots" class="p-3 space-y-3">
            <!-- Tags and hotspot info boxes rendered by JS -->
          </div>
          <div id="related-entries" class="p-3 border-t-[3px] border-black hidden">
            <!-- Related entries rendered by JS -->
          </div>
          <div id="detail-bottom-nav" class="detail-bottom-nav hidden">
            <button id="btn-detail-prev">[ &lt; Previous ]</button>
            <button id="btn-detail-next">[ Next &gt; ]</button>
          </div>
        </div>

      </div>

    </div>

    <!-- ============================================================
         BOTTOM STATUS BAR
    ============================================================ -->
    <footer class="border-t-[3px] border-black bg-overlay grid grid-cols-4 shrink-0">
      <div class="px-4 py-3 border-r-[3px] border-black">

      </div>
      <div class="px-4 py-3">
        <span class="text-[9px] uppercase tracking-[0.2em] opacity-40 block">Entry</span>
        <span id="status-entry" class="text-xs font-bold uppercase tracking-wide block mt-1">--</span>
      </div>
    </footer>

            'Static Presentation (Plinth / Mannequin)',
            'Salon / Intimate Appointment',
            'Immersive Environment (360-Degree Set)',
            'Performance Art / Live Action',
            'Kinetic / Mechanical Runway',
            'Public / Open-Access Spectacle',
            'Pop-Up / Temporary Structure'
          ],
          'Digital Transmission': [
            'Live Streamed Event',
            'Fashion Film / Cinematic Narrative',
            'Lookbook / Still Photography Series',
            'Social Media Native Campaign (Instagram / TikTok)',
            'Augmented Reality (AR) Overlay',
            '3D Rendered Environment',
            'Editorial Exclusive Release',
            'Archival / Found Footage Assemblage',
            'Interactive Web Experience',
            'Documentary / Behind-The-Scenes Format',
            'Television / Broadcast Special',
            'Virtual Showroom / Portal'
          ]
        }
      }
    };

    /* Derived flat pillar list for backward compatibility */
    const taxonomyPillars = Object.entries(taxonomyData).map(function (pair) {
      return { label: pair[1].label, key: pair[0] };
    });

    /* ============================================================
       DOM
    ============================================================ */
    const $ = (id) => document.getElementById(id);

    /* ============================================================
       UTILITIES
    ============================================================ */
    function debounce(fn, delay) {
      let t;
      return function (...a) {
        clearTimeout(t);
        t = setTimeout(() => fn.apply(this, a), delay);
      };
    }

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function getFilteredEntries() {
      const q = AppState.searchQuery.toLowerCase();
      const pillar = AppState.activePillar;

      return archiveData.filter((entry) => {
        if (pillar) {
          const v = entry.tags[pillar.key] || '';
          if (!v) return false;
        }
        if (q) {
          const searchable = [
            entry.title, entry.season, String(entry.year), entry.description,
            ...Object.values(entry.tags),
          ].join(' ').toLowerCase();
          if (!searchable.includes(q)) return false;
        }
        return true;
      });
    }

    /* ============================================================
       RENDER: HEADER METADATA
    ============================================================ */
    function updateHeaderMeta() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      $('header-rel').textContent = yyyy + '.' + mm;
      $('header-count').textContent = archiveData.length;
    }

    /* ============================================================
       RENDER: IMAGE GRID
    ============================================================ */
    function renderImageGrid() {
      const entries = getFilteredEntries();
      const grid = $('image-grid');

      if (entries.length === 0) {
        grid.innerHTML = '<div class="col-span-3 p-12 text-center"><p class="text-[10px] uppercase tracking-[0.2em] opacity-40">No entries match your query.</p></div>';
        return;
      }

      /* Generate multiple thumbnails per entry to fill the grid */
      let html = '';
      entries.forEach((entry) => {
        const variants = [
          { w: 400, h: 550, suffix: '1' },
          { w: 400, h: 500, suffix: '2' },
          { w: 400, h: 520, suffix: '3' },
          { w: 400, h: 480, suffix: '4' },
          { w: 400, h: 540, suffix: '5' },
          { w: 400, h: 510, suffix: '6' },
          { w: 400, h: 530, suffix: '7' },
          { w: 400, h: 490, suffix: '8' },
          { w: 400, h: 560, suffix: '9' },
          { w: 400, h: 500, suffix: '10' },
          { w: 400, h: 520, suffix: '11' },
          { w: 400, h: 540, suffix: '12' },
        ];

        const snippet = entry.description.length > 80
          ? entry.description.substring(0, 80) + '...'
          : entry.description;

        variants.forEach((v, i) => {
          html += `<div class="group relative overflow-hidden cursor-crosshair" data-entry-id="${entry.id}" data-img-index="${i}">
            <img
              src="https://placehold.co/${v.w}x${v.h}/e5e5e5/999999?text=${encodeURIComponent(entry.tags.brand)}+${v.suffix}"
              alt="${entry.title}"
              class="desaturate w-full aspect-[3/4] object-cover block hover:filter-none transition-all duration-200"
              loading="lazy"
            />
            <div class="grid-overlay">
              <p class="text-[10px] font-bold uppercase tracking-wider text-white font-mono">${entry.tags.brand}</p>
              <p class="text-[9px] uppercase tracking-wide text-white/70 mt-0.5 font-mono">${entry.year}</p>
              <p class="text-[9px] text-white/60 mt-1 leading-snug font-mono">${snippet}</p>
            </div>
          </div>`;
        });
      });

      grid.innerHTML = html;
    }

    /* ============================================================
       RENDER: ENTRY LIST
    ============================================================ */
    function renderEntryList() {
      const entries = getFilteredEntries();
      const list = $('entry-list');
      let html = '';

      entries.forEach((entry, i) => {
        const isActive = AppState.selectedEntryId === entry.id;
        const activeClass = isActive ? 'entry-row-active' : '';

        html += `<div class="border-b-[3px] border-black px-4 py-3 cursor-crosshair transition-all duration-75 hover:bg-black hover:text-white ${activeClass}" data-entry-id="${entry.id}">
          <div class="flex items-baseline gap-3">
            <span class="text-[10px] opacity-50">${pad(i + 1)}</span>
            <div>
              <p class="text-xs font-bold uppercase tracking-[0.08em]">${entry.tags.brand}</p>
              <p class="text-[10px] uppercase tracking-[0.1em] opacity-60 mt-0.5">${entry.year} &middot; ${entry.season}</p>
            </div>
          </div>
        </div>`;
      });

      list.innerHTML = html;
    }

    /* ============================================================
       RENDER: TAXONOMY GRID
    ============================================================ */
    function renderTaxonomyGrid() {
      const grid = $('taxonomy-grid');
      let html = '';

      taxonomyPillars.forEach(function (p) {
        const isExpanded = AppState.expandedPillar === p.key;
        html += '<div class="taxonomy-cell ' + (isExpanded ? 'active' : '') + '" data-pillar-key="' + p.key + '">' + p.label + '</div>';
      });

      if (taxonomyPillars.length % 2 !== 0) {
        html += '<div class="taxonomy-cell" style="border-right:none;opacity:0;pointer-events:none;">&nbsp;</div>';
      }

      grid.innerHTML = html;
    }

    /* ============================================================
       RENDER: TAXONOMY SUB-CATEGORIES
    ============================================================ */
    function renderTaxonomySub() {
      const subContainer = $('taxonomy-sub');

      if (!AppState.expandedPillar) {
        subContainer.classList.add('hidden');
        subContainer.innerHTML = '';
        return;
      }

      const pillarData = taxonomyData[AppState.expandedPillar];
      if (!pillarData) return;

      subContainer.classList.remove('hidden');
      let html = '';

      if (Array.isArray(pillarData.children)) {
        /* Flat list of sub-categories */
        pillarData.children.forEach(function (item) {
          var isActive = AppState.activeSubFilter === item;
          html += '<div class="taxonomy-sub-item' + (isActive ? ' active' : '') + '" data-sub-value="' + item.replace(/'/g, '&#39;') + '">' + item + '</div>';
        });
      } else {
        /* Grouped sub-categories */
        Object.keys(pillarData.children).forEach(function (groupName) {
          var isGroupExpanded = AppState.expandedGroup === groupName;
          html += '<div class="taxonomy-group-header' + (isGroupExpanded ? ' active' : '') + '" data-group-name="' + groupName.replace(/'/g, '&#39;') + '">' + groupName + '</div>';

          if (isGroupExpanded) {
            pillarData.children[groupName].forEach(function (item) {
              var isActive = AppState.activeSubFilter === item;
              html += '<div class="taxonomy-sub-item' + (isActive ? ' active' : '') + '" data-sub-value="' + item.replace(/'/g, '&#39;') + '" style="padding-left:24px;">' + item + '</div>';
            });
          }
        });
      }

      subContainer.innerHTML = html;
    }

    /* ============================================================
       TAXONOMY INTERACTION HANDLERS
    ============================================================ */
    function handlePillarClick(key) {
      if (AppState.expandedPillar === key) {
        /* Collapse */
        AppState.expandedPillar = null;
        AppState.expandedGroup = null;
        AppState.activeSubFilter = null;
        AppState.searchQuery = '';
        AppState.activePillar = null;
        $('search-input').value = '';
      } else {
        /* Expand */
        AppState.expandedPillar = key;
        AppState.expandedGroup = null;
        AppState.activeSubFilter = null;
      }
      renderTaxonomyGrid();
      renderTaxonomySub();
      renderEntryList();
      renderImageGrid();
    }

    function handleGroupClick(groupName) {
      if (AppState.expandedGroup === groupName) {
        AppState.expandedGroup = null;
        AppState.activeSubFilter = null;
      } else {
        AppState.expandedGroup = groupName;
        AppState.activeSubFilter = null;
      }
      renderTaxonomySub();
    }

    function handleSubItemClick(value) {
      if (AppState.activeSubFilter === value) {
        AppState.activeSubFilter = null;
        AppState.searchQuery = '';
        AppState.activePillar = null;
        $('search-input').value = '';
      } else {
        AppState.activeSubFilter = value;
        AppState.searchQuery = value;
        AppState.activePillar = null;
        $('search-input').value = value;
      }
      renderTaxonomySub();
      renderEntryList();
      renderImageGrid();
    }

    /* ============================================================
       RENDER: STATUS BAR
    ============================================================ */
    function renderStatusBar() {
      const entry = archiveData.find((e) => e.id === AppState.selectedEntryId);

      if (entry) {
        $('status-brand').textContent = entry.tags.brand;
        $('status-year').textContent = entry.year;
        $('status-season').textContent = entry.season;
        $('status-entry').textContent = pad(archiveData.indexOf(entry) + 1) + ' / ' + pad(archiveData.length);
      } else {
        $('status-brand').innerHTML = '--';
        $('status-year').innerHTML = '--';
        $('status-season').innerHTML = '--';
        $('status-entry').innerHTML = '--';
      }
    }

    /* ============================================================
       HELPERS: RELATED ENTRIES + TAG FILTERING
    ============================================================ */
    function findRelatedEntries(entry, count) {
      if (typeof count === 'undefined') count = 3;
      const entryTagValues = Object.values(entry.tags).map(function (v) {
        return v.toLowerCase();
      });

      const scored = [];
      archiveData.forEach(function (candidate) {
        if (candidate.id === entry.id) return;
        let score = 0;
        Object.values(candidate.tags).forEach(function (val) {
          if (entryTagValues.indexOf(val.toLowerCase()) !== -1) {
            score++;
          }
        });
        if (score >= 1) {
          scored.push({ entry: candidate, score: score });
        }
      });

      scored.sort(function (a, b) { return b.score - a.score; });
      return scored.slice(0, count).map(function (s) { return s.entry; });
    }

    function filterByTagValue(key, value) {
      closeDetail();
      AppState.searchQuery = value;
      AppState.activePillar = null;
      AppState.expandedPillar = null;
      AppState.expandedGroup = null;
      AppState.activeSubFilter = null;
      $('search-input').value = value;
      renderImageGrid();
      renderEntryList();
      renderTaxonomyGrid();
      renderTaxonomySub();
    }

    /* ============================================================
       DETAIL VIEW
    ============================================================ */
    function openDetail(entryId) {
      AppState.currentView = 'detail';
      AppState.selectedEntryId = entryId;

      const entry = archiveData.find((e) => e.id === entryId);
      if (!entry) return;

      /* Swap grid for detail image */
      $('grid-view').classList.add('hidden');
      const detailView = $('detail-image-view');
      detailView.classList.remove('hidden');

      $('detail-image').src = entry.imageUrl;
      $('detail-image').alt = entry.title;

      /* Show nav bar and set position label */
      const navBar = $('detail-nav');
      navBar.classList.remove('hidden');
      const filtered = getFilteredEntries();
      const posIndex = filtered.findIndex(function (e) { return e.id === entryId; });
      $('detail-nav-label').textContent = pad(posIndex + 1) + ' / ' + pad(filtered.length);

      /* Render hotspot dots */
      detailView.querySelectorAll('.hotspot-dot').forEach((el) => el.remove());
      entry.hotspots.forEach((spot, i) => {
        const dot = document.createElement('div');
        dot.className = 'hotspot-dot';
        dot.style.left = spot.x + '%';
        dot.style.top = spot.y + '%';
        dot.setAttribute('data-index', i);
        detailView.appendChild(dot);
      });

      /* Show active entry panel */
      $('active-entry-panel').classList.remove('hidden');
      $('active-entry-title').textContent = 'Active Entry: ' + entry.tags.brand + ' ' + entry.year;

      /* Render taxonomy pill tags */
      const container = $('active-entry-hotspots');
      container.innerHTML = '';

      const tagsRow = document.createElement('div');
      tagsRow.style.display = 'flex';
      tagsRow.style.flexWrap = 'wrap';
      tagsRow.style.gap = '6px';
      tagsRow.style.paddingBottom = '12px';
      tagsRow.style.borderBottom = '2px solid #000';
      tagsRow.style.marginBottom = '12px';

      Object.entries(entry.tags).forEach(function (pair) {
        const key = pair[0];
        const value = pair[1];
        const pill = document.createElement('button');
        pill.className = 'tag-pill';
        pill.textContent = value;
        pill.addEventListener('click', function () {
          filterByTagValue(key, value);
        });
        tagsRow.appendChild(pill);
      });
      container.appendChild(tagsRow);

      /* Render hotspot info boxes */
      entry.hotspots.forEach((spot, i) => {
        const box = document.createElement('div');
        box.className = 'info-box p-3';
        box.setAttribute('data-hotspot-index', i);
        box.innerHTML = `
          <div class="flex items-start justify-between mb-1">
            <p class="text-[11px] font-bold uppercase tracking-wider">${spot.label}</p>
            <button class="text-[10px] font-bold ml-2 hover:opacity-60 hotspot-box-close">X</button>
          </div>
          <p class="text-[10px] leading-relaxed mt-1">${spot.description}</p>
        `;
        container.appendChild(box);
      });

      /* Render related entries matrix */
      const relatedContainer = $('related-entries');
      const related = findRelatedEntries(entry);

      if (related.length > 0) {
        relatedContainer.classList.remove('hidden');
        let relHtml = '<p class="text-[9px] font-bold uppercase tracking-[0.15em] opacity-50 mb-3">Related Entries</p>';
        relHtml += '<div style="display:flex;gap:8px;overflow-x:auto;">';

        related.forEach(function (rel) {
          relHtml += `<div class="related-card" data-related-id="${rel.id}" style="width:100px;">
            <img
              src="${rel.imageUrl}"
              alt="${rel.title}"
              class="desaturate block"
              style="width:100px;height:120px;object-fit:cover;"
            />
            <div style="padding:6px;">
              <p class="text-[9px] font-bold uppercase tracking-wide font-mono">${rel.tags.brand}</p>
              <p class="text-[8px] uppercase tracking-wide opacity-60 font-mono mt-0.5">${rel.year}</p>
            </div>
          </div>`;
        });

        relHtml += '</div>';
        relatedContainer.innerHTML = relHtml;
      } else {
        relatedContainer.classList.add('hidden');
        relatedContainer.innerHTML = '';
      }

      /* Show detail bottom navigation */
      $('detail-bottom-nav').classList.remove('hidden');

      /* Update other views */
      renderEntryList();
      renderStatusBar();
    }

    function closeDetail() {
      AppState.currentView = 'grid';
      AppState.selectedEntryId = null;

      $('detail-image-view').classList.add('hidden');
      $('detail-nav').classList.add('hidden');
      $('grid-view').classList.remove('hidden');
      $('active-entry-panel').classList.add('hidden');
      $('related-entries').classList.add('hidden');
      $('detail-bottom-nav').classList.add('hidden');

      hideHotspotPopup();
      renderEntryList();
      renderStatusBar();
    }

    function navigateEntry(direction) {
      const entries = getFilteredEntries();
      if (entries.length <= 1) return;
      const currentIndex = entries.findIndex(function (e) {
        return e.id === AppState.selectedEntryId;
      });
      if (currentIndex === -1) return;
      let newIndex = currentIndex + direction;
      if (newIndex < 0) newIndex = entries.length - 1;
      if (newIndex >= entries.length) newIndex = 0;
      openDetail(entries[newIndex].id);
    }

    /* ============================================================
       HOTSPOT POPUP
    ============================================================ */
    function showHotspotPopup(index, dotEl) {
      const entry = archiveData.find((e) => e.id === AppState.selectedEntryId);
      if (!entry) return;
      const spot = entry.hotspots[index];
      if (!spot) return;

      AppState.activeHotspot = index;

      const popup = $('hotspot-popup');
      $('hotspot-label').textContent = spot.label;
      $('hotspot-desc').textContent = spot.description;

      const rect = dotEl.getBoundingClientRect();
      const pw = 280;
      const offset = 16;

      let left = rect.right + offset;
      let top = rect.top - 10;

      if (left + pw > window.innerWidth - 20) {
        left = rect.left - pw - offset;
      }
      if (top + 140 > window.innerHeight - 20) {
        top = window.innerHeight - 160;
      }
      if (top < 10) top = 10;

      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
      popup.style.width = pw + 'px';
      popup.classList.remove('hidden');

      /* Highlight corresponding info box in panel */
      document.querySelectorAll('#active-entry-hotspots .info-box').forEach((el, i) => {
        if (i === index) {
          el.style.borderColor = '#000';
          el.style.background = '#000';
          el.style.color = '#fff';
        } else {
          el.style.borderColor = '#000';
          el.style.background = '#FDFCF0';
          el.style.color = '#000';
        }
      });
    }

    function hideHotspotPopup() {
      $('hotspot-popup').classList.add('hidden');
      AppState.activeHotspot = null;

      /* Reset info box highlights */
      document.querySelectorAll('#active-entry-hotspots .info-box').forEach((el) => {
        el.style.background = '#FDFCF0';
        el.style.color = '#000';
      });
    }

    /* ============================================================
       FILTERING
    ============================================================ */
    function handleSearch(value) {
      AppState.searchQuery = value;
      AppState.expandedPillar = null;
      AppState.expandedGroup = null;
      AppState.activeSubFilter = null;
      renderTaxonomyGrid();
      renderTaxonomySub();
      renderEntryList();
      renderImageGrid();
    }

    /* ============================================================
       INIT
    ============================================================ */
    function init() {
      updateHeaderMeta();
      renderImageGrid();
      renderEntryList();
      renderTaxonomyGrid();
      renderTaxonomySub();
      renderStatusBar();

      /* Search */
      $('search-input').addEventListener('input', debounce(function (e) {
        handleSearch(e.target.value);
      }, 150));

      /* Entry list click (delegated) */
      $('entry-list').addEventListener('click', function (e) {
        const row = e.target.closest('[data-entry-id]');
        if (!row) return;
        const id = row.getAttribute('data-entry-id');
        if (AppState.selectedEntryId === id) {
          closeDetail();
        } else {
          openDetail(id);
        }
      });

      /* Image grid click (delegated) */
      $('image-grid').addEventListener('click', function (e) {
        const cell = e.target.closest('[data-entry-id]');
        if (!cell) return;
        const id = cell.getAttribute('data-entry-id');
        openDetail(id);
      });

      /* Hotspot dot click (delegated) */
      $('detail-image-view').addEventListener('click', function (e) {
        const dot = e.target.closest('.hotspot-dot');
        if (!dot) return;
        e.stopPropagation();
        const idx = parseInt(dot.getAttribute('data-index'), 10);
        showHotspotPopup(idx, dot);
      });

      /* Detail nav buttons */
      $('btn-back-grid').addEventListener('click', closeDetail);
      $('btn-prev-entry').addEventListener('click', function () { navigateEntry(-1); });
      $('btn-next-entry').addEventListener('click', function () { navigateEntry(1); });

      /* Close detail */
      $('btn-close-detail').addEventListener('click', closeDetail);

      /* Close popup */
      $('btn-close-popup').addEventListener('click', function (e) {
        e.stopPropagation();
        hideHotspotPopup();
      });

      /* Close hotspot info box */
      document.addEventListener('click', function (e) {
        if (e.target.classList.contains('hotspot-box-close')) {
          e.target.closest('.info-box').remove();
        }
      });

      /* Related entry card click (delegated) */
      $('related-entries').addEventListener('click', function (e) {
        const card = e.target.closest('[data-related-id]');
        if (!card) return;
        const id = card.getAttribute('data-related-id');
        openDetail(id);
      });

      /* Detail bottom nav buttons */
      $('btn-detail-prev').addEventListener('click', function () { navigateEntry(-1); });
      $('btn-detail-next').addEventListener('click', function () { navigateEntry(1); });

      /* Taxonomy pillar click */
      $('taxonomy-grid').addEventListener('click', function (e) {
        const cell = e.target.closest('.taxonomy-cell');
        if (!cell) return;
        const key = cell.getAttribute('data-pillar-key');
        if (key) handlePillarClick(key);
      });

      /* Taxonomy sub-category click */
      $('taxonomy-sub').addEventListener('click', function (e) {
        var groupHeader = e.target.closest('.taxonomy-group-header');
        if (groupHeader) {
          var groupName = groupHeader.getAttribute('data-group-name');
          if (groupName) handleGroupClick(groupName);
          return;
        }
        var subItem = e.target.closest('.taxonomy-sub-item');
        if (subItem) {
          var value = subItem.getAttribute('data-sub-value');
          if (value) handleSubItemClick(value);
        }
      });

      /* Click outside popup */
      document.addEventListener('click', function (e) {
        if (AppState.activeHotspot === null) return;
        const popup = $('hotspot-popup');
        if (!popup.contains(e.target) && !e.target.closest('.hotspot-dot')) {
          hideHotspotPopup();
        }
      });

      /* Keyboard navigation */
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          if (AppState.activeHotspot !== null) {
            hideHotspotPopup();
          } else if (AppState.currentView === 'detail') {
            closeDetail();
          }
        }
        if (AppState.currentView === 'detail') {
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            navigateEntry(-1);
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            navigateEntry(1);
          }
        }
      });
    }

    document.addEventListener('DOMContentLoaded', init);

    /* ============================================================
       ARCHIVE DATA ENGINE
    ============================================================ */
    const archiveData = [
      {
        id: 'margiela-aw94',
        title: 'Maison Margiela Autumn/Winter 1994',
        year: 1994,
        season: 'Autumn/Winter',
        imageUrl: 'https://placehold.co/800x1100/e5e5e5/333333?text=Margiela+AW94',
        description:
          'A collection that redefined the boundary between construction and deconstruction. Martin Margiela presented garments that exposed their own making; linings became exteriors and raw edges replaced finished seams. The show took place in a disused warehouse in the 18th arrondissement; reinforcing the label\'s commitment to anti-spectacle. This body of work is frequently cited in academic discourse on post-structuralist fashion theory; particularly in relation to the dissolution of hierarchical garment conventions.',
        tags: {
          brand: 'Maison Margiela',
          era: '1990 - 1999',
          politics: 'Class & Scarcity',
          theories: 'Deconstruction',
          gender: 'Unisex',
          materials: 'Raw Textiles',
          geography: 'Paris',
          form: 'Architectural Shielding',
          format: 'Runway',
        },
        hotspots: [
          {
            x: 35,
            y: 22,
            label: 'Exposed Lining',
            description:
              'Silk lining deliberately turned outward; reversing the interior/exterior hierarchy of the garment. A signature Margiela technique from this period.',
          },
          {
            x: 60,
            y: 55,
            label: 'Raw Hem Construction',
            description:
              'Unfinished edges left deliberately frayed. The garment refuses the convention of a polished terminus; the process of making remains visible.',
          },
          {
            x: 45,
            y: 80,
            label: 'Tabi Boot',
            description:
              'The split-toe boot; derived from Japanese tabi socks. First introduced in the Spring/Summer 1989 debut and present in nearly every subsequent collection.',
          },
        ],
      },
    ];
  </script>
</body>
